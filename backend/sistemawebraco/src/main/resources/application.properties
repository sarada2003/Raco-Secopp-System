#APLICATION
spring.application.name=sistemawebraco
server.port=8090

#POSGRESS
spring.datasource.url=jdbc:postgresql://localhost:5432/secopp_raco_db
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect


#JWT
jwt.expiration=86400000
jwt.secret=${JWT_SECRET}

# OPENAI
spring.ai.openai.api-key=${OPENAI_API_KEY}

#SECOP
secop.api.base-url=https://www.datos.gov.co
secop.api.resource-path=/resource/p6dx-8zbt.json
secop.api.app-token=${SECOP_APP_TOKEN}



